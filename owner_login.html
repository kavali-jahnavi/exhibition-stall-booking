<!DOCTYPE html>
<html>
<head>
<title>Owner Login - Fusion Fest 2026</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.auth-box{
width:360px;margin:80px auto;padding:30px;
background:white;border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.12);text-align:left;
}
.auth-box h2{text-align:center;margin-bottom:20px;}
.auth-box input{
width:100%;padding:10px;margin-bottom:14px;
border-radius:6px;border:1px solid #ccc;box-sizing:border-box;
}
.auth-box button{
width:100%;padding:10px;background:#4CAF50;color:white;
border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:15px;
}
.auth-box button:hover{background:#45a049;}
.error-msg{color:#e57373;text-align:center;margin-bottom:10px;}
.auth-box a{display:block;text-align:center;margin-top:12px;color:#2f3640;}
</style>
</head>
<body>
<h1>Fusion Fest 2026</h1>
<div class="auth-box">
<h2>Owner Login</h2>
{% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<a href="/owner/register">New owner? Register here</a>
<a href="/">← Back to Map</a>
</div>
</body>
</html>
